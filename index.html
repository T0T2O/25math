<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>25マス・チャレンジ</title>
    <style>
        :root { --main: #4caf50; --bg: #f9f9f9; --border: #ccc; }
        body { font-family: 'Hiragino Kaku Gothic ProN', sans-serif; background: #fffde7; text-align: center; margin: 0; padding: 15px; }
        .container { background: white; max-width: 500px; margin: 0 auto; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); box-sizing: border-box; }
        
        .btn { padding: 12px 20px; font-weight: bold; cursor: pointer; border: 2px solid var(--main); background: white; color: var(--main); border-radius: 10px; margin: 5px; transition: 0.2s; font-size: 1rem; }
        .btn.active { background: var(--main); color: white; }

        #status-bar { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 10px; font-size: 1rem; color: #333; }
        #timer { color: #d32f2f; background: #ffebee; padding: 2px 8px; border-radius: 5px; }

        /* 表のレイアウト修正ポイント */
        table { 
            table-layout: fixed; /* 列の幅を固定する */
            width: 100%; 
            border-collapse: collapse; 
            margin: 0 auto;
        }
        td { 
            width: 16.66%; /* 6列(見出し1+入力5)なので100/6 */
            border: 2px solid var(--border); 
            position: relative; 
            padding: 0;
            aspect-ratio: 1/1; /* 正方形を維持 */
        }
        .head-cell { background: #f1f8e9; font-weight: bold; font-size: 1.2rem; color: #2e7d32; vertical-align: middle; }
        .op-cell { background: #c8e6c9; font-size: 1.4rem; font-weight: bold; vertical-align: middle; }
        
        input { 
            width: 100%; 
            height: 100%; 
            border: none; 
            text-align: center; 
            font-size: 1.4rem; 
            outline: none; 
            background: transparent; 
            -moz-appearance: textfield; 
            box-sizing: border-box;
            display: block;
        }
        input::-webkit-inner-spin-button, input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input:focus { background: #e3f2fd; }
        input.correct { color: #2e7d32; font-weight: bold; }
        input.wrong { background: #ffcdd2; color: #c62828; }

        /* 結果画面 */
        #result-screen { display: none; margin-top: 20px; padding: 20px; border-radius: 15px; border: 3px solid var(--main); background: #f1f8e9; }
        .record-box { display: flex; justify-content: space-around; margin: 15px 0; }
        .record-item { text-align: center; }
        .record-label { font-size: 0.8rem; color: #666; display: block; }
        .record-val { font-size: 2rem; font-weight: 900; color: var(--main); }
        .total-q { font-size: 0.9rem; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen">
        <h2 style="color:var(--main); margin-top:0;">🥦 25マス・チャレンジ</h2>
        <p style="font-size:0.9rem; color:#666;">5分間で何問とけるかな？<br>さいごに「答え合わせ」を押してね！</p>
        <div style="margin-bottom: 20px;">
            <button class="btn active" onclick="setMode('+', this)">たし算</button>
            <button class="btn" onclick="setMode('-', this)">ひき算</button>
            <button class="btn" onclick="setMode('×', this)">かけ算</button>
        </div>
        <button class="btn" style="background:var(--main); color:white; width:90%; font-size:1.2rem; border:none; box-shadow:0 4px #2e7d32;" onclick="startGame()">スタート！</button>
    </div>

    <div id="game-area" style="display:none;">
        <div id="status-bar">
            <span>のこり <span id="timer">05:00</span></span>
            <span id="current-count">0 / 25 完了</span>
        </div>
        
        <table id="math-table"></table>

        <button id="finish-btn" class="btn" style="width:100%; margin-top:20px; background:#455a64; color:white; border:none;" onclick="endGame()">答え合わせ！</button>
        
        <div id="result-screen">
            <h3 style="margin:0; color:#2e7d32;">ミッション完了！</h3>
            <div class="record-box">
                <div class="record-item">
                    <span class="record-label">うめた数</span>
                    <span class="record-val" id="res-attempt">0</span><span class="total-q"> / 25</span>
                </div>
                <div class="record-item">
                    <span class="record-label">あっていた数</span>
                    <span class="record-val" id="res-correct" style="color:#e65100;">0</span><span class="total-q"> / 25</span>
                </div>
            </div>
            <p id="comment" style="font-weight:bold; color:#555; padding:0 10px;"></p>
            <button class="btn" onclick="location.reload()" style="width:100%; margin-top:10px;">もう一回やる！</button>
        </div>
    </div>
</div>

<script>
let mode = '+';
let timeLeft = 300;
let timerInterval;
let answers = {};

function setMode(m, btn) {
    mode = m;
    document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

function startGame() {
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('game-area').style.display = 'block';
    
    const table = document.getElementById('math-table');
    // 数字の範囲を1〜9でランダム生成
    const topNums = Array.from({length: 5}, () => Math.floor(Math.random() * 9) + 1);
    const sideNums = Array.from({length: 5}, () => Math.floor(Math.random() * 9) + 1);
    
    if (mode === '-') {
        // ひき算は上の段を大きく、横の段を小さくしてマイナスを回避
        sideNums.forEach((s, i) => sideNums[i] = Math.floor(Math.random() * 5));
        topNums.forEach((t, i) => topNums[i] = Math.floor(Math.random() * 5) + 5);
    }

    let html = `<tr><td class="op-cell">${mode}</td>`;
    topNums.forEach(n => html += `<td class="head-cell">${n}</td>`);
    html += '</tr>';

    for (let r = 0; r < 5; r++) {
        html += `<tr><td class="head-cell">${sideNums[r]}</td>`;
        for (let c = 0; c < 5; c++) {
            const id = `cell-${r}-${c}`;
            html += `<td><input type="number" id="${id}" oninput="updateCount()" inputmode="numeric"></td>`;
            if (mode === '+') answers[id] = sideNums[r] + topNums[c];
            if (mode === '-') answers[id] = topNums[c] - sideNums[r];
            if (mode === '×') answers[id] = sideNums[r] * topNums[c];
        }
        html += '</tr>';
    }
    table.innerHTML = html;

    timerInterval = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timer').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        if (timeLeft <= 0) endGame();
    }, 1000);
}

function updateCount() {
    let count = 0;
    document.querySelectorAll('input').forEach(i => { if(i.value !== "") count++; });
    document.getElementById('current-count').innerText = `${count} / 25 完了`;
}

function endGame() {
    clearInterval(timerInterval);
    document.getElementById('finish-btn').style.display = 'none';
    
    let attemptCount = 0;
    let correctCount = 0;

    for (let id in answers) {
        const input = document.getElementById(id);
        const val = input.value;
        if (val !== "") {
            attemptCount++;
            if (parseInt(val) === answers[id]) {
                correctCount++;
                input.classList.add('correct');
            } else {
                input.classList.add('wrong');
            }
        }
        input.readOnly = true;
    }

    document.getElementById('res-attempt').innerText = attemptCount;
    document.getElementById('res-correct').innerText = correctCount;
    
    let msg = "ナイスチャレンジ！次はもっと埋められるかな？";
    if(correctCount === 25) msg = "すごい！全部せいかい！パーフェクト！🥦✨";
    else if(correctCount >= 20) msg = "すばらしい！名人（めいじん）まであとちょっと！";
    else if(attemptCount === 25) msg = "全部うめたね！そのいきおい、最高だよ！";

    document.getElementById('comment').innerText = msg;
    document.getElementById('result-screen').style.display = 'block';
}
</script>
</body>
</html>
