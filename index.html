<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
    <title>25マス・ダッシュ：フェーバー</title>
    <style>
        :root { 
            --main: #455a64; 
            --bg: #f0f2f5; 
            --accent: #4caf50;
            --gold: #ffd700;
            --rainbow: linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #00bfff, #9400d3);
        }
        body { font-family: 'Hiragino Kaku Gothic ProN', sans-serif; background: var(--bg); color: #333; text-align: center; margin: 0; padding: 15px; overflow-x: hidden; }
        
        /* メインコンテナ */
        .container { background: white; max-width: 500px; margin: 0 auto; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); box-sizing: border-box; position: relative; z-index: 10; }
        
        /* ボタン不具合修正用のスタイル */
        .mode-select { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .mode-btn { 
            flex: 1; padding: 12px; font-weight: bold; cursor: pointer; 
            border: 2px solid #cfd8dc; background: white; color: #607d8b; border-radius: 12px; transition: 0.2s; 
        }
        /* 選択されているボタンだけのスタイル */
        .mode-btn.active { 
            border-color: var(--main); background: var(--main); color: white; 
        }

        #status-bar { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 15px; font-size: 1rem; }
        #timer { color: #d32f2f; background: #ffebee; padding: 2px 10px; border-radius: 20px; }

        /* 計算マス目 */
        table { table-layout: fixed; width: 100%; border-collapse: collapse; margin: 0 auto; border: 2px solid #cfd8dc; }
        td { width: 16.6%; border: 1px solid #cfd8dc; position: relative; aspect-ratio: 1/1; }
        .head-cell { background: #f8f9fa; font-weight: bold; font-size: 1.2rem; color: var(--main); vertical-align: middle; }
        .op-cell { background: #eceff1; font-size: 1.4rem; font-weight: bold; color: var(--main); vertical-align: middle; }
        
        input { width: 100%; height: 100%; border: none; text-align: center; font-size: 1.4rem; outline: none; background: transparent; display: block; -webkit-appearance: none; }
        input:focus { background: #e3f2fd; }
        input.correct { color: #2e7d32; font-weight: bold; }
        input.wrong { background: #ffebee; color: #c62828; }

        #finish-btn { width: 100%; margin-top: 20px; padding: 15px; background: var(--main); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }

        /* 結果画面 */
        #result-screen { display: none; margin-top: 20px; padding: 20px; border-radius: 15px; background: #fdfdfd; border: 1px solid #eee; }
        .res-row { display: flex; justify-content: space-around; margin: 15px 0; }
        .res-label { font-size: 0.8rem; color: #78909c; display: block; }
        .res-num { font-size: 2.2rem; font-weight: 900; color: var(--main); }

        /* 【究極ご褒美】フェーバー画面 */
        #fever-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; overflow: hidden;
        }
        #star-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .fever-content { position: relative; z-index: 100; text-align: center; width: 90%; }
        .perfect-title { 
            font-size: clamp(3rem, 15vw, 6rem); font-weight: 900; margin: 0;
            background: var(--rainbow); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.5)); animation: pulse 1s infinite alternate;
        }
        .medal-big { font-size: 8rem; margin: 20px 0; filter: drop-shadow(0 0 20px var(--gold)); animation: bounce 2s infinite; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    </style>
</head>
<body>

<div class="container" id="main-ui">
    <div id="start-screen">
        <h2 style="color:var(--main); margin:0;">25マス・ダッシュ</h2>
        <p style="color:#78909c; font-size:0.9rem;">5分間で全問正解を目指そう！</p>
        
        <div class="mode-select">
            <button class="mode-btn active" onclick="setMode('+', this)">たし算</button>
            <button class="mode-btn" onclick="setMode('-', this)">ひき算</button>
            <button class="mode-btn" onclick="setMode('×', this)">かけ算</button>
        </div>
        
        <button class="mode-btn" style="background:var(--accent); color:white; border:none; width:100%; font-size:1.2rem; padding:15px;" onclick="startGame()">ミッション開始</button>
    </div>

    <div id="game-area" style="display:none;">
        <div id="status-bar">
            <span>のこり <span id="timer">05:00</span></span>
            <span id="current-count">0 / 25 完了</span>
        </div>
        <table id="math-table"></table>
        <button id="finish-btn" onclick="endGame()">答え合わせ！</button>
        
        <div id="result-screen">
            <h3 style="margin:0; color:var(--main);">きろく</h3>
            <div class="res-row">
                <div><span class="res-label">うめた数</span><span class="res-num" id="res-attempt">0</span></div>
                <div><span class="res-label">あっていた数</span><span class="res-num" id="res-correct" style="color:var(--accent);">0</span></div>
            </div>
            <p id="comment" style="font-weight:bold; margin-bottom:20px;"></p>
            <button id="reward-btn" class="mode-btn" style="display:none; background:var(--gold); color:#000; border:none; width:100%; margin-bottom:10px; font-size:1.1rem;" onclick="showFever()">★ ご褒美を受け取る！</button>
            <button class="mode-btn" onclick="location.reload()" style="width:100%;">もう一度やる</button>
        </div>
    </div>
</div>

<div id="fever-overlay">
    <canvas id="star-canvas"></canvas>
    <div class="fever-content">
        <p style="color:var(--gold); letter-spacing: 5px; font-weight: bold; margin:0;">MISSION COMPLETE</p>
        <h1 class="perfect-title">PERFECT!</h1>
        <div class="medal-big">🥇</div>
        <p style="color:white; font-size:1.2rem; font-weight:bold; text-shadow: 0 0 10px var(--accent);">君は計算のマスターだ！</p>
        <button class="mode-btn" style="background:white; color:black; width:200px; margin-top:30px;" onclick="location.reload()">タイトルに戻る</button>
    </div>
</div>

<script>
let mode = '+', timeLeft = 300, timerInterval, answers = {};

// ① ボタンの色の不具合を修正した関数
function setMode(m, btn) {
    mode = m;
    // 一旦すべてのボタンから active クラスを消す
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    // 押されたボタンだけに active クラスをつける
    btn.classList.add('active');
}

function startGame() {
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('game-area').style.display = 'block';
    const table = document.getElementById('math-table');
    const top = Array.from({length: 5}, () => Math.floor(Math.random() * 9) + 1);
    const side = Array.from({length: 5}, () => Math.floor(Math.random() * 9) + 1);
    
    if (mode === '-') {
        side.forEach((s, i) => side[i] = Math.floor(Math.random() * 5));
        top.forEach((t, i) => top[i] = Math.floor(Math.random() * 5) + 5);
    }

    let html = `<tr><td class="op-cell">${mode}</td>`;
    top.forEach(n => html += `<td class="head-cell">${n}</td>`);
    html += '</tr>';
    for (let r = 0; r < 5; r++) {
        html += `<tr><td class="head-cell">${side[r]}</td>`;
        for (let c = 0; c < 5; c++) {
            const id = `cell-${r}-${c}`;
            html += `<td><input type="number" id="${id}" oninput="updateCount()" inputmode="numeric"></td>`;
            if (mode === '+') answers[id] = side[r] + top[c];
            if (mode === '-') answers[id] = top[c] - side[r];
            if (mode === '×') answers[id] = side[r] * top[c];
        }
        html += '</tr>';
    }
    table.innerHTML = html;

    timerInterval = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
        document.getElementById('timer').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        if (timeLeft <= 0) endGame();
    }, 1000);
}

function updateCount() {
    let count = 0;
    document.querySelectorAll('input').forEach(i => { if(i.value !== "") count++; });
    document.getElementById('current-count').innerText = `${count} / 25 完了`;
}

function endGame() {
    clearInterval(timerInterval);
    document.getElementById('finish-btn').style.display = 'none';
    let att = 0, cor = 0;
    for (let id in answers) {
        const input = document.getElementById(id);
        if (input.value !== "") {
            att++;
            if (parseInt(input.value) === answers[id]) { cor++; input.classList.add('correct'); }
            else { input.classList.add('wrong'); }
        }
        input.readOnly = true;
    }
    document.getElementById('res-attempt').innerText = att;
    document.getElementById('res-correct').innerText = cor;
    document.getElementById('result-screen').style.display = 'block';
    
    if (cor === 25) {
        document.getElementById('comment').innerText = "完璧です！マスターの称号を授与します！";
        document.getElementById('reward-btn').style.display = 'block';
    } else {
        document.getElementById('comment').innerText = "ナイスチャレンジ！次は満点を目指そう。";
    }
}

// ② 豪華ご褒美演出（スターフィールド）
function showFever() {
    document.getElementById('fever-overlay').style.display = 'flex';
    const canvas = document.getElementById('star-canvas');
    const ctx = canvas.getContext('2d');
    let w = canvas.width = window.innerWidth, h = canvas.height = window.innerHeight;
    let stars = Array.from({length: 200}, () => ({
        x: Math.random() * w - w/2, y: Math.random() * h - h/2, z: Math.random() * w
    }));
    function anim() {
        ctx.fillStyle = "black"; ctx.fillRect(0,0,w,h);
        ctx.save(); ctx.translate(w/2, h/2);
        stars.forEach(s => {
            s.z -= 15; if(s.z <= 0) s.z = w;
            let sx = (s.x / s.z) * w, sy = (s.y / s.z) * h, sz = (1 - s.z / w) * 5;
            ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(sx, sy, sz, 0, Math.PI*2); ctx.fill();
        });
        ctx.restore(); requestAnimationFrame(anim);
    }
    anim();
}
</script>
</body>
</html>
