<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>25マス・ダッシュ</title>
    <style>
        :root { --main: #4caf50; --bg: #f9f9f9; --border: #ccc; }
        body { font-family: 'Hiragino Kaku Gothic ProN', sans-serif; background: #e8f5e9; text-align: center; margin: 0; padding: 20px; }
        .container { background: white; max-width: 500px; margin: 0 auto; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* モード選択 */
        .mode-select { margin-bottom: 20px; }
        .btn { padding: 10px 20px; font-weight: bold; cursor: pointer; border: 2px solid var(--main); background: white; color: var(--main); border-radius: 8px; margin: 5px; transition: 0.2s; }
        .btn.active { background: var(--main); color: white; }

        /* タイマーとスコア */
        #status-bar { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 10px; font-size: 1.2rem; color: #333; }
        #timer { color: #d32f2f; }

        /* 25マステーブル */
        table { border-collapse: collapse; margin: 0 auto; background: white; }
        td { width: 60px; height: 60px; border: 2px solid var(--border); position: relative; padding: 0; }
        .head-cell { background: #f1f8e9; font-weight: bold; font-size: 1.2rem; color: #2e7d32; }
        .op-cell { background: #c8e6c9; font-size: 1.5rem; font-weight: bold; }
        
        input { width: 100%; height: 100%; border: none; text-align: center; font-size: 1.3rem; outline: none; background: transparent; }
        input:focus { background: #fff9c4; }
        input.correct { color: #2e7d32; font-weight: bold; }
        input.wrong { background: #ffcdd2; color: #c62828; }

        /* 結果表示 */
        #result-screen { display: none; margin-top: 20px; padding: 15px; border-radius: 10px; background: #fff9c4; }
        .score-val { font-size: 2rem; color: #e65100; font-weight: 900; }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen">
        <h2 style="color:var(--main);">🥦 25マス・ダッシュ</h2>
        <p>5分間で何問とけるかな？</p>
        <div class="mode-select">
            <button class="btn active" onclick="setMode('+', this)">たし算</button>
            <button class="btn" onclick="setMode('-', this)">ひき算</button>
            <button class="btn" onclick="setMode('×', this)">かけ算</button>
        </div>
        <button class="btn" style="background:var(--main); color:white; width:100%; font-size:1.2rem;" onclick="startGame()">ミッション開始！</button>
    </div>

    <div id="game-area" style="display:none;">
        <div id="status-bar">
            <span>残り時間: <span id="timer">05:00</span></span>
            <span id="score-display">正解: 0 / 25</span>
        </div>
        
        <table id="math-table">
            </table>

        <button id="finish-btn" class="btn" style="width:100%; margin-top:20px; background:#666; color:white;" onclick="endGame()">答え合わせをする</button>
        
        <div id="result-screen">
            <div class="score-val" id="final-score">0点</div>
            <p id="comment"></p>
            <button class="btn" onclick="location.reload()">もう一度挑戦！</button>
        </div>
    </div>
</div>

<script>
let mode = '+';
let timeLeft = 300; // 5分
let timerInterval;
let answers = {};

function setMode(m, btn) {
    mode = m;
    document.querySelectorAll('.mode-select .btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

function startGame() {
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('game-area').style.display = 'block';
    
    const table = document.getElementById('math-table');
    const rows = 5;
    const cols = 5;
    
    // 数値の生成
    const topNums = Array.from({length: cols}, () => Math.floor(Math.random() * 9) + 1);
    const sideNums = Array.from({length: rows}, () => Math.floor(Math.random() * 9) + 1);
    
    // ひき算の場合、マイナスにならないよう調整
    if (mode === '-') {
        sideNums.forEach((s, i) => { if(s > 5) sideNums[i] = Math.floor(Math.random()*5); });
        topNums.forEach((t, i) => { if(t < 5) topNums[i] = Math.floor(Math.random()*5) + 5; });
    }

    // テーブル生成
    let html = `<tr><td class="op-cell">${mode}</td>`;
    topNums.forEach(n => html += `<td class="head-cell">${n}</td>`);
    html += '</tr>';

    for (let r = 0; r < rows; r++) {
        html += `<tr><td class="head-cell">${sideNums[r]}</td>`;
        for (let c = 0; c < cols; c++) {
            const id = `cell-${r}-${c}`;
            html += `<td><input type="number" id="${id}" oninput="checkCount()" pattern="\\d*"></td>`;
            
            // 正解の保存
            let ans;
            if (mode === '+') ans = sideNums[r] + topNums[c];
            if (mode === '-') ans = topNums[c] - sideNums[r];
            if (mode === '×') ans = sideNums[r] * topNums[c];
            answers[id] = ans;
        }
        html += '</tr>';
    }
    table.innerHTML = html;

    // タイマー開始
    timerInterval = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timer').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        if (timeLeft <= 0) endGame();
    }, 1000);
}

function checkCount() {
    let attempted = 0;
    document.querySelectorAll('input').forEach(input => {
        if(input.value !== "") attempted++;
    });
}

function endGame() {
    clearInterval(timerInterval);
    document.getElementById('finish-btn').style.display = 'none';
    let correctCount = 0;

    for (let id in answers) {
        const input = document.getElementById(id);
        const userAns = parseInt(input.value);
        if (userAns === answers[id]) {
            correctCount++;
            input.classList.add('correct');
        } else if (input.value !== "") {
            input.classList.add('wrong');
        }
        input.readOnly = true;
    }

    const score = correctCount * 4; // 25問なので1問4点
    document.getElementById('final-score').innerText = `${score}点`;
    document.getElementById('score-display').innerText = `正解: ${correctCount} / 25`;
    
    let msg = "よくがんばったね！";
    if(score === 100) msg = "完璧！パーフェクト！🥦✨";
    else if(score >= 80) msg = "すごい！あと少しで満点だ！";
    
    document.getElementById('comment').innerText = msg;
    document.getElementById('result-screen').style.display = 'block';
}
</script>
</body>
</html>
